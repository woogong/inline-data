<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오류 - InlineData</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 720px; margin: 4rem auto; padding: 0 1rem; text-align: center; }
        .error-code { font-size: 4rem; font-weight: 700; color: #e74c3c; margin-bottom: 0.5rem; }
        .error-message { font-size: 1.1rem; color: #555; margin-bottom: 2rem; }
        .btn { display: inline-block; padding: 0.6rem 1.4rem; background: #3498db; color: #fff; text-decoration: none; border-radius: 4px; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code" th:text="${errorStatus} ?: '오류'">오류</div>
        <div class="error-message"
             th:text="${errorMessage} ?: '요청 처리 중 오류가 발생했습니다.'">
            요청 처리 중 오류가 발생했습니다.
        </div>
        <a href="/" class="btn">홈으로</a>
    </div>
</body>
</html>
