<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- 스타일 fragment -->
<style th:fragment="styles">
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #fff; border-radius: 8px; padding: 1.5rem; max-width: 560px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
        .modal h3 { margin-bottom: 0.3rem; color: #2c3e50; }
        .modal .profile-info { font-size: 0.9rem; color: #555; margin-bottom: 1rem; }
        .modal table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.85rem; }
        .modal th, .modal td { padding: 0.3rem 0.5rem; border: 1px solid #ddd; text-align: left; }
        .modal th { background: #f5f5f5; }
        .modal .close-btn { float: right; background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #999; }
        .modal .close-btn:hover { color: #333; }
        .athlete-link { cursor: pointer; color: #3498db; text-decoration: underline; }
        .athlete-link:hover { color: #2980b9; }
</style>

<!-- 모달 HTML + 스크립트 fragment (compId 파라미터 필요) -->
<div th:fragment="modal(compId)">
    <div id="athleteModal" class="modal-overlay">
        <div class="modal">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h3 id="modalName"></h3>
            <div class="profile-info" id="modalProfile"></div>
            <div id="modalMedals"></div>
        </div>
    </div>

    <script th:inline="javascript">
        const PROFILE_URL = /*[[@{/competitions/{id}/athlete-profile(id=${compId})}]]*/ '';

        document.addEventListener('click', function(e) {
            var link = e.target.closest('.athlete-link');
            if (!link) return;
            var name = link.dataset.name;
            if (!name) return;
            openAthleteModal(name);
        });

        async function openAthleteModal(name) {
            var modal = document.getElementById('athleteModal');
            document.getElementById('modalName').textContent = name;
            document.getElementById('modalProfile').textContent = '불러오는 중...';
            document.getElementById('modalMedals').innerHTML = '';
            modal.classList.add('active');

            try {
                var res = await fetch(PROFILE_URL + '?name=' + encodeURIComponent(name));
                var data = await res.json();

                var profileText = '';
                if (data.region) profileText += data.region;
                if (data.teamName) profileText += ' ' + data.teamName;
                if (!profileText) profileText = '소속 정보 없음';
                document.getElementById('modalProfile').textContent = profileText;

                if (data.medals && data.medals.length > 0) {
                    var html = '<table><thead><tr><th>대회</th><th>부별</th><th>종목</th><th>순위</th><th>기록</th></tr></thead><tbody>';
                    var medalIcon = {1: '\u{1F947}', 2: '\u{1F948}', 3: '\u{1F949}'};
                    for (var i = 0; i < data.medals.length; i++) {
                        var m = data.medals[i];
                        html += '<tr>';
                        html += '<td>' + escHtml(m.competitionName) + '</td>';
                        html += '<td>' + escHtml(m.divisionName) + '</td>';
                        html += '<td>' + escHtml(m.eventName) + '</td>';
                        html += '<td>' + (medalIcon[m.ranking] || '') + ' ' + m.ranking + '위</td>';
                        html += '<td>' + (m.record || '') + '</td>';
                        html += '</tr>';
                    }
                    html += '</tbody></table>';
                    document.getElementById('modalMedals').innerHTML = html;
                } else {
                    document.getElementById('modalMedals').innerHTML = '<p style="color:#999; font-size:0.9rem;">입상 이력이 없습니다.</p>';
                }

                if (data.athleteId) {
                    document.getElementById('modalName').innerHTML = escHtml(name) +
                        ' <a href="/athletes/' + data.athleteId + '" style="font-size:0.8rem; font-weight:normal;">상세 페이지</a>';
                }
            } catch (err) {
                document.getElementById('modalProfile').textContent = '정보를 불러올 수 없습니다.';
            }
        }

        function closeModal() { document.getElementById('athleteModal').classList.remove('active'); }
        document.getElementById('athleteModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        function escHtml(s) {
            var d = document.createElement('div'); d.textContent = s; return d.innerHTML;
        }
    </script>
</div>
</body>
</html>
