<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${athlete.name} + ' - InlineData'">선수 상세 - InlineData</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
        nav { background: #2c3e50; color: #fff; padding: 0.8rem 0; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #fff; text-decoration: underline; }
        nav .nav-brand { font-weight: bold; font-size: 1.1rem; }
        main { padding: 1.5rem 0; }
        dl { margin: 0.5rem 0 1rem; }
        dt { font-weight: 600; color: #555; margin-top: 0.5rem; display: inline-block; width: 60px; }
        dd { display: inline; margin-left: 0; }
        dd::after { content: ''; display: block; }
        table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; }
        th, td { padding: 0.4rem 0.8rem; border: 1px solid #ddd; text-align: left; font-size: 0.9rem; }
        th { background: #f5f5f5; font-weight: 600; }
        tr:hover { background: #fafafa; }
        h2 { margin-top: 1.5rem; margin-bottom: 0.3rem; color: #2c3e50; font-size: 1.1rem; }
        .new-record { font-weight: 600; font-size: 0.8rem; }
        .new-record.nr-competition { color: #e74c3c; }
        .new-record.nr-division { color: #e67e22; }
        .new-record.nr-korea { color: #2980b9; }
        .new-record.nr-world { color: #8e44ad; }
        .q-mark { color: #27ae60; font-weight: 700; }
        .note { color: #999; font-size: 0.85rem; }
        .btn { display: inline-block; padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .actions { margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
        <h1 th:text="${athlete.name}">선수명</h1>
        <dl>
            <th:block th:if="${athlete.birthYear != null}">
                <dt>생년</dt>
                <dd th:text="${athlete.birthYear}"></dd>
            </th:block>
            <th:block th:if="${profile != null and profile.region != null}">
                <dt>소속</dt>
                <dd>
                    <span th:text="${profile.region}"></span>
                    <span th:if="${profile.teamName != null}" th:text="' ' + ${profile.teamName}"></span>
                </dd>
            </th:block>
            <th:block th:if="${profile != null and profile.divisionsText != null}">
                <dt>부별</dt>
                <dd th:text="${profile.divisionsText}"></dd>
            </th:block>
        </dl>

        <th:block th:if="${performances != null and !performances.isEmpty()}">
            <h2>경기 성과</h2>
            <table>
                <thead>
                    <tr>
                        <th>대회</th>
                        <th>부별</th>
                        <th>종목</th>
                        <th>라운드</th>
                        <th>순위</th>
                        <th>기록</th>
                        <th>진출</th>
                        <th>비고</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${performances}">
                        <td th:text="${p.competitionName}"></td>
                        <td th:text="${p.divisionName}"></td>
                        <td th:text="${p.eventName}"></td>
                        <td th:text="${p.round}"></td>
                        <td>
                            <span th:text="${p.ranking}"></span>
                            <span th:if="${p.round == '결승' or p.round == '조별결승'}">
                                <span th:if="${p.ranking == 1}"> &#x1F947;</span>
                                <span th:if="${p.ranking == 2}"> &#x1F948;</span>
                                <span th:if="${p.ranking == 3}"> &#x1F949;</span>
                            </span>
                        </td>
                        <td>
                            <span th:text="${p.record}"></span>
                            <span th:if="${p.newRecord != null}" class="new-record"
                                  th:classappend="${p.newRecord == '대회신' ? 'nr-competition' : (p.newRecord == '부별신' ? 'nr-division' : (p.newRecord == '한국신' ? 'nr-korea' : (p.newRecord == '세계신' ? 'nr-world' : '')))}"
                                  th:text="' ' + ${p.newRecord}"></span>
                        </td>
                        <td><span th:if="${p.qualification != null}" class="q-mark" th:text="${p.qualification}"></span></td>
                        <td><span th:if="${p.note != null}" class="note" th:text="${p.note}"></span></td>
                    </tr>
                </tbody>
            </table>
        </th:block>

        <div class="actions">
            <a th:href="@{/athletes}" class="btn btn-secondary">목록으로</a>
        </div>
    </main>
</body>
</html>
