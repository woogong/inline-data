<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${athlete.name} + ' - InlineData'">선수 상세 - InlineData</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
        nav { background: #2c3e50; color: #fff; padding: 0.8rem 0; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #fff; text-decoration: underline; }
        nav .nav-brand { font-weight: bold; font-size: 1.1rem; }
        main { padding: 1.5rem 0; }
        dl { margin: 1rem 0; }
        dt { font-weight: 600; color: #555; margin-top: 0.8rem; }
        dd { margin-left: 0; padding: 0.3rem 0; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { padding: 0.5rem 0.8rem; border: 1px solid #ddd; text-align: left; }
        th { background: #f5f5f5; font-weight: 600; }
        tr:hover { background: #fafafa; }
        h2 { margin-top: 1.5rem; color: #2c3e50; font-size: 1.1rem; }
        .btn { display: inline-block; padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .actions { margin-top: 1.5rem; }
        .division-tag { display: inline-block; padding: 0.1rem 0.4rem; background: #e8f4fd; border-radius: 3px; font-size: 0.8rem; margin: 0.1rem; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
        <h1 th:text="${athlete.name}">선수명</h1>
        <dl>
            <dt>성별</dt>
            <dd th:text="${athlete.gender == 'M' ? '남' : (athlete.gender == 'F' ? '여' : '혼성')}"></dd>
            <th:block th:if="${athlete.birthYear != null}">
                <dt>생년</dt>
                <dd th:text="${athlete.birthYear}"></dd>
            </th:block>
        </dl>

        <th:block th:if="${!history.isEmpty()}">
            <h2>대회 참가 이력</h2>
            <table>
                <thead>
                    <tr>
                        <th>대회</th>
                        <th>소속</th>
                        <th>학년</th>
                        <th>출전 부별</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="h : ${history}">
                        <td th:text="${h.competitionName}"></td>
                        <td>
                            <span th:if="${h.region != null}" th:text="${h.region}"></span>
                            <span th:if="${h.teamName != null}" th:text="' ' + ${h.teamName}"></span>
                        </td>
                        <td th:text="${h.grade}"></td>
                        <td>
                            <span th:each="div : ${h.divisions}" class="division-tag" th:text="${div}"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </th:block>

        <div class="actions">
            <a th:href="@{/athletes}" class="btn btn-secondary">목록으로</a>
        </div>
    </main>
</body>
</html>
