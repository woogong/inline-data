<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선수 목록 - InlineData</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
        nav { background: #2c3e50; color: #fff; padding: 0.8rem 0; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #fff; text-decoration: underline; }
        nav .nav-brand { font-weight: bold; font-size: 1.1rem; }
        main { padding: 1.5rem 0; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { padding: 0.6rem 0.8rem; border: 1px solid #ddd; text-align: left; }
        th { background: #f5f5f5; font-weight: 600; }
        tr:hover { background: #fafafa; }
        a { color: #3498db; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
        <h1>선수 목록</h1>
        <table>
            <thead>
                <tr>
                    <th>이름</th>
                    <th>성별</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="a : ${athletes}">
                    <td><a th:href="@{/athletes/{id}(id=${a.id})}" th:text="${a.name}"></a></td>
                    <td th:text="${a.gender == 'M' ? '남' : (a.gender == 'F' ? '여' : '혼성')}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(athletes)}">
                    <td colspan="2" style="text-align:center; color:#999;">등록된 선수가 없습니다.</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
