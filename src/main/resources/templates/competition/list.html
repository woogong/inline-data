<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대회 목록 - InlineData</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
        nav { background: #2c3e50; color: #fff; padding: 0.8rem 0; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #fff; text-decoration: underline; }
        nav .nav-brand { font-weight: bold; font-size: 1.1rem; }
        main { padding: 1.5rem 0; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { padding: 0.6rem 0.8rem; border: 1px solid #ddd; text-align: left; }
        th { background: #f5f5f5; font-weight: 600; }
        tr:hover { background: #fafafa; }
        a { color: #3498db; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
        <h1>대회 목록</h1>
        <table>
            <thead>
                <tr>
                    <th>대회명</th>
                    <th>대회기간</th>
                    <th>장소</th>
                    <th>주최</th>
                    <th>종목</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${competitions}">
                    <td><a th:href="@{/competitions/{id}(id=${c.id})}" th:text="${(c.edition != null ? '제' + c.edition + '회 ' : '') + c.shortName}"></a></td>
                    <td>
                        <span th:if="${c.startDate != null and c.endDate != null}"
                              th:text="${c.startDate} + ' ~ ' + ${c.endDate}"></span>
                        <span th:if="${c.startDate != null and c.endDate == null}"
                              th:text="${c.startDate}"></span>
                    </td>
                    <td th:text="${c.venue}"></td>
                    <td th:text="${c.host}"></td>
                    <td><a th:href="@{/competitions/{id}/events(id=${c.id})}">종목</a></td>
                </tr>
                <tr th:if="${#lists.isEmpty(competitions)}">
                    <td colspan="5" style="text-align:center; color:#999;">등록된 대회가 없습니다.</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
