<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${dto.id != null} ? '소속 수정 - InlineData' : '소속 등록 - InlineData'">소속 폼 - InlineData</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
        nav { background: #2c3e50; color: #fff; padding: 0.8rem 0; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #fff; text-decoration: underline; }
        nav .nav-brand { font-weight: bold; font-size: 1.1rem; }
        main { padding: 1.5rem 0; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
        .form-group .error { color: #e74c3c; font-size: 0.85rem; margin-top: 0.2rem; }
        .btn { display: inline-block; padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .actions { margin-top: 1.5rem; }
        .actions > * { margin-right: 0.5rem; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
        <h1 th:text="${dto.id != null} ? '소속 수정' : '소속 등록'">소속 폼</h1>

        <form th:action="${dto.id != null} ? @{/admin/teams/{id}(id=${dto.id})} : @{/admin/teams}"
              method="post" th:object="${dto}">

            <div class="form-group">
                <label for="name">소속명 *</label>
                <input type="text" id="name" th:field="*{name}" maxlength="100" required>
                <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="form-group">
                <label for="region">시도 *</label>
                <select id="region" th:field="*{region}" required>
                    <option value="">선택</option>
                    <option value="서울">서울</option>
                    <option value="부산">부산</option>
                    <option value="대구">대구</option>
                    <option value="인천">인천</option>
                    <option value="광주">광주</option>
                    <option value="대전">대전</option>
                    <option value="울산">울산</option>
                    <option value="세종">세종</option>
                    <option value="경기">경기</option>
                    <option value="강원">강원</option>
                    <option value="충북">충북</option>
                    <option value="충남">충남</option>
                    <option value="전북">전북</option>
                    <option value="전남">전남</option>
                    <option value="경북">경북</option>
                    <option value="경남">경남</option>
                    <option value="제주">제주</option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('region')}" th:errors="*{region}"></div>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary" th:text="${dto.id != null} ? '수정' : '등록'">저장</button>
                <a th:href="${dto.id != null} ? @{/admin/teams/{id}(id=${dto.id})} : @{/admin/teams}"
                   class="btn btn-secondary">취소</a>
            </div>
        </form>
    </main>
</body>
</html>
