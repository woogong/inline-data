<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엔트리 등록 - InlineData</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
        nav { background: #2c3e50; color: #fff; padding: 0.8rem 0; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #fff; text-decoration: underline; }
        nav .nav-brand { font-weight: bold; font-size: 1.1rem; }
        main { padding: 1.5rem 0; }
        .heat-section { margin: 1.5rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 6px; }
        .heat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .heat-header h2 { margin: 0; color: #2c3e50; font-size: 1.1rem; }
        table { width: 100%; border-collapse: collapse; margin: 0.3rem 0; }
        th, td { padding: 0.3rem 0.5rem; border: 1px solid #ddd; text-align: left; }
        th { background: #f5f5f5; font-weight: 600; font-size: 0.85rem; }
        td input { width: 100%; padding: 0.2rem 0.3rem; border: 1px solid #e0e0e0; border-radius: 3px; font-size: 0.85rem; }
        td input:focus { border-color: #3498db; outline: none; background: #f0f8ff; }
        .entry-row.saving { opacity: 0.6; }
        .entry-row.saved td input { border-color: #27ae60; }
        .entry-row.save-error td input { border-color: #e74c3c; }
        .entry-row.new-row td:not(:last-child) { background: #f0f8ff; }
        .status-icon { display: inline-block; width: 16px; text-align: center; font-size: 0.8rem; }
        .btn { display: inline-block; padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-sm { padding: 0.2rem 0.5rem; font-size: 0.8rem; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-add { background: #27ae60; color: #fff; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-save { background: #3498db; color: #fff; }
        .add-heat-bar { margin: 1rem 0; display: flex; gap: 0.5rem; align-items: center; }
        .add-heat-bar input { width: 60px; padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        .actions { margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
        <h1 th:text="${event.divisionName} + ' ' + ${event.eventName} + ' ' + ${round.round} + ' - 엔트리 등록'">엔트리 등록</h1>

        <div class="add-heat-bar">
            <input type="number" id="newHeatNumber" min="0" placeholder="조" value="1">
            <button type="button" class="btn btn-primary" id="addHeatBtn">조 추가</button>
            <span style="color:#999; font-size:0.85rem;">(0 = 결승)</span>
        </div>

        <div id="heatsContainer">
            <div th:each="heatEntry : ${heatsWithEntries}" class="heat-section" th:attr="data-heat-id=${heatEntry.key.id}">
                <div class="heat-header">
                    <h2 th:text="${heatEntry.key.heatNumber == 0 ? '결승' : heatEntry.key.heatNumber + '조'}">조</h2>
                    <div>
                        <button type="button" class="btn btn-add btn-sm add-entry-btn">+ 선수 추가</button>
                        <button type="button" class="btn btn-danger btn-sm delete-heat-btn">조 삭제</button>
                    </div>
                </div>
                <table>
                    <thead><tr><th style="width:70px">참가번호</th><th style="width:120px">이름</th><th style="width:80px">지역</th><th>팀명</th><th style="width:80px"></th></tr></thead>
                    <tbody>
                        <tr th:each="he : ${heatEntry.value}" class="entry-row existing" th:attr="data-heat-entry-id=${he.id}">
                            <td><input type="text" data-field="bibNumber" th:value="${he.bibNumber}" style="width:50px; text-align:center;" readonly></td>
                            <td><input type="text" data-field="name" th:value="${he.entry.athleteName}" readonly></td>
                            <td><input type="text" data-field="region" th:value="${he.entry.region}" readonly></td>
                            <td><input type="text" data-field="teamName" th:value="${he.entry.teamName}" readonly></td>
                            <td style="text-align:center;"><button type="button" class="btn btn-danger btn-sm delete-entry-btn">X</button> <span class="status-icon"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="actions">
            <a th:href="@{/admin/competitions/{compId}/events/{eventId}/rounds/{roundId}(compId=${competition.id}, eventId=${event.id}, roundId=${round.id})}" class="btn btn-secondary">경기로 돌아가기</a>
        </div>
    </main>

    <script th:inline="javascript">
        const BASE = [[@{/admin/competitions/{compId}/events/{eventId}/rounds/{roundId}(compId=${competition.id}, eventId=${event.id}, roundId=${round.id})}]];
        const HEAT_ADD_URL = BASE + '/heats/add';
        const HEAT_DELETE_URL = BASE + '/heats/delete';
        const ENTRY_SAVE_URL = BASE + '/entries/save';
        const ENTRY_DELETE_URL = BASE + '/entries/delete';

        document.getElementById('addHeatBtn').addEventListener('click', () => {
            const input = document.getElementById('newHeatNumber');
            const heatNumber = parseInt(input.value);
            if (isNaN(heatNumber) || heatNumber < 0) return;
            fetch(HEAT_ADD_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ heatNumber: String(heatNumber) }) })
            .then(r => r.json()).then(data => {
                if (data.status === 'ok' && !document.querySelector(`.heat-section[data-heat-id="${data.heatId}"]`)) {
                    addHeatSection(data.heatId, heatNumber);
                    input.value = heatNumber + 1;
                }
            });
        });

        function addHeatSection(heatId, heatNumber) {
            const section = document.createElement('div');
            section.className = 'heat-section'; section.dataset.heatId = heatId;
            section.innerHTML = `<div class="heat-header"><h2>${heatNumber === 0 ? '결승' : heatNumber + '조'}</h2><div><button type="button" class="btn btn-add btn-sm add-entry-btn">+ 선수 추가</button> <button type="button" class="btn btn-danger btn-sm delete-heat-btn">조 삭제</button></div></div><table><thead><tr><th style="width:70px">참가번호</th><th style="width:120px">이름</th><th style="width:80px">지역</th><th>팀명</th><th style="width:80px"></th></tr></thead><tbody></tbody></table>`;
            document.getElementById('heatsContainer').appendChild(section);
            bindHeatSection(section);
        }

        function addEntryRow(section) {
            const tr = document.createElement('tr');
            tr.className = 'entry-row new-row'; tr.dataset.heatId = section.dataset.heatId;
            tr.innerHTML = `<td><input type="text" data-field="bibNumber" style="width:50px; text-align:center;" placeholder="번호"></td><td><input type="text" data-field="name" placeholder="이름"></td><td><input type="text" data-field="region" placeholder="지역"></td><td><input type="text" data-field="teamName" placeholder="팀명"></td><td style="text-align:center;"><button type="button" class="btn btn-save btn-sm save-entry-btn">저장</button> <button type="button" class="btn btn-danger btn-sm delete-entry-btn">X</button> <span class="status-icon"></span></td>`;
            section.querySelector('tbody').appendChild(tr);
            bindEntryRow(tr);
            tr.querySelector('[data-field="bibNumber"]').focus();
        }

        function saveRow(row) {
            const data = { heatId: row.dataset.heatId || row.closest('.heat-section').dataset.heatId, bibNumber: row.querySelector('[data-field="bibNumber"]').value, name: row.querySelector('[data-field="name"]').value, region: row.querySelector('[data-field="region"]').value, teamName: row.querySelector('[data-field="teamName"]').value };
            if (!data.bibNumber.trim() || !data.name.trim()) return;
            const icon = row.querySelector('.status-icon');
            row.classList.remove('saved', 'save-error'); row.classList.add('saving'); icon.textContent = '...';
            fetch(ENTRY_SAVE_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
            .then(res => { row.classList.remove('saving'); if (res.ok) { row.classList.remove('new-row'); row.classList.add('saved'); icon.textContent = '\u2713'; row.querySelectorAll('input').forEach(i => i.setAttribute('readonly', '')); const sb = row.querySelector('.save-entry-btn'); if (sb) sb.style.display = 'none'; setTimeout(() => { row.classList.remove('saved'); icon.textContent = ''; }, 2000); } else { row.classList.add('save-error'); icon.textContent = '\u2717'; } })
            .catch(() => { row.classList.remove('saving'); row.classList.add('save-error'); icon.textContent = '\u2717'; });
        }

        function deleteEntryRow(row) {
            const id = row.dataset.heatEntryId;
            if (id) { if (!confirm('삭제하시겠습니까?')) return; fetch(ENTRY_DELETE_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ heatEntryId: id }) }).then(r => { if (r.ok) row.remove(); }); }
            else row.remove();
        }

        function bindEntryRow(row) {
            const sb = row.querySelector('.save-entry-btn'); if (sb) sb.addEventListener('click', () => saveRow(row));
            row.querySelector('.delete-entry-btn').addEventListener('click', () => deleteEntryRow(row));
        }

        function bindHeatSection(section) {
            section.querySelector('.add-entry-btn').addEventListener('click', () => addEntryRow(section));
            section.querySelector('.delete-heat-btn').addEventListener('click', () => { if (!confirm('조와 엔트리를 모두 삭제하시겠습니까?')) return; fetch(HEAT_DELETE_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ heatId: section.dataset.heatId }) }).then(r => { if (r.ok) section.remove(); }); });
            section.querySelectorAll('.entry-row').forEach(bindEntryRow);
        }

        document.querySelectorAll('.heat-section').forEach(bindHeatSection);
    </script>
</body>
</html>
