<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>종목 관리 - InlineData</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
        nav { background: #2c3e50; color: #fff; padding: 0.8rem 0; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #fff; text-decoration: underline; }
        nav .nav-brand { font-weight: bold; font-size: 1.1rem; }
        main { padding: 1.5rem 0; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { padding: 0.5rem 0.8rem; border: 1px solid #ddd; text-align: left; }
        th { background: #f5f5f5; font-weight: 600; }
        tr:hover { background: #fafafa; }
        a { color: #3498db; }
        .btn { display: inline-block; padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .actions { margin: 1rem 0; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .empty { text-align: center; color: #999; padding: 2rem; }
        .msg-success { padding: 0.6rem 1rem; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 4px; margin-bottom: 1rem; }
        .msg-error { padding: 0.6rem 1rem; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; border-radius: 4px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
        <h1 th:text="${(competition.edition != null ? '제' + competition.edition + '회 ' : '') + competition.shortName} + ' - 종목 관리'">종목 관리</h1>

        <div th:if="${message}" class="msg-success" th:text="${message}"></div>
        <div th:if="${errorMessage}" class="msg-error" th:text="${errorMessage}"></div>

        <div class="actions">
            <a th:href="@{/admin/competitions/{compId}/events/new(compId=${competition.id})}" class="btn btn-primary">종목 등록</a>
            <form th:action="@{/admin/competitions/{compId}/events/import(compId=${competition.id})}" method="post" enctype="multipart/form-data"
                  style="display:flex; gap:0.5rem; align-items:center;">
                <input type="file" name="file" accept=".pdf" required style="font-size:0.85rem;">
                <button type="submit" class="btn btn-primary">조편성 PDF 가져오기</button>
            </form>
            <a th:href="@{/admin/competitions/{compId}/mapping(compId=${competition.id})}" class="btn btn-primary">선수 매핑</a>
            <a th:href="@{/admin/competitions/{id}(id=${competition.id})}" class="btn btn-secondary">대회로 돌아가기</a>
        </div>

        <div th:if="${events.isEmpty()}" class="empty">등록된 종목이 없습니다.</div>

        <div th:if="${!events.isEmpty()}">
            <div style="display:flex; gap:0.5rem; align-items:center; margin:1rem 0;">
                <label style="font-weight:600; font-size:0.9rem;">부별</label>
                <select id="filterDivision" style="padding:0.3rem 0.5rem; border:1px solid #ccc; border-radius:4px; font-size:0.9rem;">
                    <option value="">전체</option>
                </select>
                <label style="font-weight:600; font-size:0.9rem; margin-left:0.5rem;">종목</label>
                <select id="filterEventName" style="padding:0.3rem 0.5rem; border:1px solid #ccc; border-radius:4px; font-size:0.9rem;">
                    <option value="">전체</option>
                </select>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>부별</th>
                        <th>종목</th>
                        <th>성별</th>
                    </tr>
                </thead>
                <tbody id="eventBody">
                    <tr th:each="e : ${events}" th:attr="data-division=${e.divisionName},data-event-name=${e.eventName}">
                        <td th:text="${e.divisionName}"></td>
                        <td><a th:href="@{/admin/competitions/{compId}/events/{eventId}(compId=${competition.id}, eventId=${e.id})}"
                               th:text="${e.eventName}"></a></td>
                        <td th:text="${e.gender == 'M' ? '남' : (e.gender == 'F' ? '여' : '혼성')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const rows = document.querySelectorAll('#eventBody tr');
        const filterDiv = document.getElementById('filterDivision');
        const filterEvt = document.getElementById('filterEventName');

        // 옵션 채우기
        const divisions = new Set();
        const eventNames = new Set();
        rows.forEach(r => { divisions.add(r.dataset.division); eventNames.add(r.dataset.eventName); });
        [...divisions].sort().forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; filterDiv.appendChild(o); });
        [...eventNames].sort().forEach(e => { const o = document.createElement('option'); o.value = e; o.textContent = e; filterEvt.appendChild(o); });

        function applyFilter() {
            const d = filterDiv.value, e = filterEvt.value;
            rows.forEach(r => {
                const matchD = !d || r.dataset.division === d;
                const matchE = !e || r.dataset.eventName === e;
                r.style.display = (matchD && matchE) ? '' : 'none';
            });
        }
        filterDiv.addEventListener('change', applyFilter);
        filterEvt.addEventListener('change', applyFilter);
    </script>
</body>
</html>
