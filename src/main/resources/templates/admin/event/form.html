<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${dto.id != null} ? '종목 수정 - InlineData' : '종목 등록 - InlineData'">종목 폼 - InlineData</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
        nav { background: #2c3e50; color: #fff; padding: 0.8rem 0; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #fff; text-decoration: underline; }
        nav .nav-brand { font-weight: bold; font-size: 1.1rem; }
        main { padding: 1.5rem 0; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
        .form-group .error { color: #e74c3c; font-size: 0.85rem; margin-top: 0.2rem; }
        .form-row { display: flex; gap: 1rem; }
        .form-row .form-group { flex: 1; }
        .btn { display: inline-block; padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .actions { margin-top: 1.5rem; }
        .actions > * { margin-right: 0.5rem; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
        <h1 th:text="(${dto.id != null} ? '종목 수정' : '종목 등록') + ' - ' + ${competition.name}">종목 폼</h1>

        <form th:action="${dto.id != null} ? @{/admin/competitions/{compId}/events/{id}(compId=${competition.id}, id=${dto.id})} : @{/admin/competitions/{compId}/events(compId=${competition.id})}"
              method="post" th:object="${dto}">

            <div class="form-row">
                <div class="form-group">
                    <label for="eventNumber">경기번호 *</label>
                    <input type="number" id="eventNumber" th:field="*{eventNumber}" min="1" required>
                    <div class="error" th:if="${#fields.hasErrors('eventNumber')}" th:errors="*{eventNumber}"></div>
                </div>
                <div class="form-group">
                    <label for="dayNumber">대회일차</label>
                    <input type="number" id="dayNumber" th:field="*{dayNumber}" min="1">
                </div>
            </div>

            <div class="form-group">
                <label for="divisionName">부별명 *</label>
                <input type="text" id="divisionName" th:field="*{divisionName}" maxlength="50" required placeholder="예: 여초부 5,6학년">
                <div class="error" th:if="${#fields.hasErrors('divisionName')}" th:errors="*{divisionName}"></div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="gender">성별 *</label>
                    <select id="gender" th:field="*{gender}" required>
                        <option value="">선택</option>
                        <option value="M">남</option>
                        <option value="F">여</option>
                        <option value="X">혼성</option>
                    </select>
                    <div class="error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                </div>
                <div class="form-group">
                    <label for="eventName">종목명 *</label>
                    <input type="text" id="eventName" th:field="*{eventName}" maxlength="30" required placeholder="예: 500m+D, DTT200m">
                    <div class="error" th:if="${#fields.hasErrors('eventName')}" th:errors="*{eventName}"></div>
                </div>
                <div class="form-group">
                    <label for="round">라운드</label>
                    <select id="round" th:field="*{round}">
                        <option value="">선택</option>
                        <option value="예선">예선</option>
                        <option value="준준결승">준준결승</option>
                        <option value="준결승">준결승</option>
                        <option value="결승">결승</option>
                        <option value="조별결승">조별결승</option>
                    </select>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary" th:text="${dto.id != null} ? '수정' : '등록'">저장</button>
                <a th:href="${dto.id != null} ? @{/admin/competitions/{compId}/events/{id}(compId=${competition.id}, id=${dto.id})} : @{/admin/competitions/{compId}/events(compId=${competition.id})}"
                   class="btn btn-secondary">취소</a>
            </div>
        </form>
    </main>
</body>
</html>
