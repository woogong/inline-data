<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${event.divisionName} + ' ' + ${event.eventName} + ' (관리) - InlineData'">종목 상세 - InlineData</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
        nav { background: #2c3e50; color: #fff; padding: 0.8rem 0; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #fff; text-decoration: underline; }
        nav .nav-brand { font-weight: bold; font-size: 1.1rem; }
        main { padding: 1.5rem 0; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { padding: 0.5rem 0.8rem; border: 1px solid #ddd; text-align: left; }
        th { background: #f5f5f5; font-weight: 600; }
        tr:hover { background: #fafafa; }
        a { color: #3498db; }
        .btn { display: inline-block; padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .actions { margin-top: 1.5rem; }
        .actions > * { margin-right: 0.5rem; }
        .delete-form { display: inline; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
        <h1 th:text="${event.divisionName} + ' ' + ${event.eventName}">종목</h1>

        <h2>경기 목록</h2>
        <table>
            <thead>
                <tr>
                    <th style="width:60px">번호</th>
                    <th>라운드</th>
                    <th>일차</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${rounds}">
                    <td th:text="${r.eventNumber}"></td>
                    <td><a th:href="@{/admin/competitions/{compId}/events/{eventId}/rounds/{roundId}(compId=${competition.id}, eventId=${event.id}, roundId=${r.id})}"
                           th:text="${r.round}"></a></td>
                    <td th:text="${r.dayNumber != null ? r.dayNumber + '일차' : ''}"></td>
                </tr>
                <tr th:if="${rounds.isEmpty()}">
                    <td colspan="3" style="text-align:center; color:#999;">등록된 경기가 없습니다.</td>
                </tr>
            </tbody>
        </table>

        <div class="actions">
            <a th:href="@{/admin/competitions/{compId}/events/{eventId}/edit(compId=${competition.id}, eventId=${event.id})}" class="btn btn-primary">종목 수정</a>
            <form th:action="@{/admin/competitions/{compId}/events/{eventId}/delete(compId=${competition.id}, eventId=${event.id})}" method="post" class="delete-form"
                  onsubmit="return confirm('이 종목과 하위 경기/조/엔트리를 모두 삭제합니다. 계속하시겠습니까?');">
                <button type="submit" class="btn btn-danger">종목 삭제</button>
            </form>
            <a th:href="@{/admin/competitions/{compId}/events(compId=${competition.id})}" class="btn btn-secondary">종목 목록으로</a>
        </div>
    </main>
</body>
</html>
