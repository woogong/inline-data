<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${event.divisionName} + ' ' + ${event.eventName} + ' (관리) - InlineData'">종목 상세 - InlineData</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
        nav { background: #2c3e50; color: #fff; padding: 0.8rem 0; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #fff; text-decoration: underline; }
        nav .nav-brand { font-weight: bold; font-size: 1.1rem; }
        main { padding: 1.5rem 0; }
        dl { margin: 1rem 0; }
        dt { font-weight: 600; color: #555; margin-top: 0.8rem; }
        dd { margin-left: 0; padding: 0.3rem 0; }
        .btn { display: inline-block; padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .actions { margin-top: 1.5rem; }
        .actions > * { margin-right: 0.5rem; }
        .delete-form { display: inline; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
        <h1 th:text="'#' + ${event.eventNumber} + ' ' + ${event.divisionName} + ' ' + ${event.eventName}">종목</h1>
        <dl>
            <dt>성별</dt>
            <dd th:text="${event.gender == 'M' ? '남' : (event.gender == 'F' ? '여' : '혼성')}"></dd>
            <th:block th:if="${event.round != null}">
                <dt>라운드</dt>
                <dd th:text="${event.round}"></dd>
            </th:block>
            <th:block th:if="${event.dayNumber != null}">
                <dt>대회일차</dt>
                <dd th:text="${event.dayNumber} + '일차'"></dd>
            </th:block>
            <dt>등록일시</dt>
            <dd th:text="${#temporals.format(event.createdAt, 'yyyy-MM-dd HH:mm')}"></dd>
            <dt>수정일시</dt>
            <dd th:text="${#temporals.format(event.updatedAt, 'yyyy-MM-dd HH:mm')}"></dd>
        </dl>
        <div class="actions">
            <a th:href="@{/admin/competitions/{compId}/events/{id}/edit(compId=${competition.id}, id=${event.id})}" class="btn btn-primary">수정</a>
            <form th:action="@{/admin/competitions/{compId}/events/{id}/delete(compId=${competition.id}, id=${event.id})}" method="post" class="delete-form"
                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                <button type="submit" class="btn btn-danger">삭제</button>
            </form>
            <a th:href="@{/admin/competitions/{compId}/events(compId=${competition.id})}" class="btn btn-secondary">종목 목록으로</a>
        </div>
    </main>
</body>
</html>
