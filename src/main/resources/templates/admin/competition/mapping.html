<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${competition.name} + ' - 매핑'">매핑 - InlineData</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 1rem; }
        nav { background: #2c3e50; color: #fff; padding: 0.8rem 0; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #fff; text-decoration: underline; }
        nav .nav-brand { font-weight: bold; font-size: 1.1rem; }
        main { padding: 1.5rem 0; }
        h1 { margin-bottom: 0.5rem; }
        .sub-title { color: #666; margin-bottom: 1rem; }
        .tab-bar { display: flex; border-bottom: 2px solid #3498db; margin-bottom: 1rem; }
        .tab-bar a { padding: 0.6rem 1.5rem; text-decoration: none; font-weight: 600; color: #555; border: 1px solid #ddd; border-bottom: none; border-radius: 4px 4px 0 0; margin-right: 2px; background: #f5f5f5; }
        .tab-bar a:hover { background: #e8e8e8; }
        .tab-bar a.active { background: #3498db; color: #fff; border-color: #3498db; }
        .toolbar { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; padding: 0.8rem; background: #f8f9fa; border-radius: 6px; }
        .toolbar input[type="text"] { padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
        .toolbar select { padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
        .toolbar .spacer { flex: 1; }
        .stats { font-size: 0.85rem; color: #666; }
        .btn { display: inline-block; padding: 0.35rem 0.8rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.85rem; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-success:hover { background: #219a52; }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-warning:hover { background: #d68910; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .btn-sm { padding: 0.2rem 0.5rem; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
        th, td { padding: 0.5rem 0.6rem; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        th { background: #f1f3f5; font-weight: 600; position: sticky; top: 0; }
        tr:hover { background: #f8f9fa; }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
        .badge-mapped { background: #d4edda; color: #155724; }
        .badge-none { background: #f8d7da; color: #721c24; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #fff; border-radius: 8px; padding: 1.5rem; width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto; }
        .modal h2 { margin-bottom: 1rem; font-size: 1.1rem; }
        .modal-close { float: right; cursor: pointer; font-size: 1.2rem; border: none; background: none; color: #999; }
        .modal-close:hover { color: #333; }
        .candidate-list { list-style: none; padding: 0; }
        .candidate-item { padding: 0.8rem; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 0.5rem; cursor: pointer; }
        .candidate-item:hover { background: #f0f7ff; border-color: #3498db; }
        .candidate-item.selected { background: #e8f4fd; border-color: #3498db; border-width: 2px; }
        .candidate-info { font-weight: 600; margin-bottom: 0.3rem; }
        .candidate-history { font-size: 0.8rem; color: #666; }
        .candidate-history ul { list-style: disc; margin-left: 1.2rem; margin-top: 0.2rem; }
        .no-candidates { color: #999; padding: 1rem; text-align: center; }
        .modal-actions { margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: flex-end; }
        .hidden { display: none; }
        .new-athlete-form { margin-top: 1rem; padding: 0.8rem; background: #f8f9fa; border-radius: 6px; }
        .new-athlete-form label { display: block; font-size: 0.85rem; margin-bottom: 0.3rem; font-weight: 600; }
        .new-athlete-form input { padding: 0.3rem 0.5rem; border: 1px solid #ccc; border-radius: 4px; width: 120px; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
        <h1>매핑 관리</h1>
        <p class="sub-title" th:text="${competition.name}">대회명</p>

        <!-- 탭 바 -->
        <div class="tab-bar">
            <a th:href="@{/admin/competitions/{id}/mapping(id=${competition.id}, tab='athlete')}"
               th:classappend="${tab == 'athlete'} ? 'active'">선수 매핑</a>
            <a th:href="@{/admin/competitions/{id}/mapping(id=${competition.id}, tab='team')}"
               th:classappend="${tab == 'team'} ? 'active'">팀 매핑</a>
        </div>

        <!-- ===== 선수 매핑 탭 ===== -->
        <div th:if="${tab == 'athlete'}">
            <div class="toolbar">
                <input type="text" id="searchName" placeholder="이름 검색..." oninput="filterTable()">
                <select id="filterStatus" onchange="filterTable()">
                    <option value="all">전체</option>
                    <option value="unmapped" selected>미매핑</option>
                    <option value="mapped">매핑완료</option>
                </select>
                <span class="spacer"></span>
                <span class="stats" id="statsText"></span>
                <button class="btn btn-success" onclick="doAutoMatch()">자동 매칭</button>
                <button class="btn btn-warning" onclick="doBulkCreate()">선택 새선수 (<span id="selectedCount">0</span>)</button>
                <a th:href="@{/admin/competitions/{id}/events(id=${competition.id})}" class="btn btn-secondary">돌아가기</a>
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width:30px"><input type="checkbox" id="checkAll" onclick="toggleCheckAll(this)"></th>
                        <th>이름</th>
                        <th>성별</th>
                        <th>소속</th>
                        <th>학년</th>
                        <th>상태</th>
                        <th>매핑 선수</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody id="entryBody">
                    <tr th:each="entry : ${entries}"
                        th:id="'row-' + ${entry.id}"
                        th:data-name="${entry.athleteName}"
                        th:data-mapped="${entry.mapped}"
                        th:data-entry-id="${entry.id}">
                        <td><input th:unless="${entry.mapped}" type="checkbox" class="entry-check" th:value="${entry.id}" onchange="updateSelectedCount()"></td>
                        <td th:text="${entry.athleteName}"></td>
                        <td th:text="${entry.gender == 'M' ? '남' : (entry.gender == 'F' ? '여' : entry.gender)}"></td>
                        <td>
                            <span th:if="${entry.region != null}" th:text="${entry.region}"></span>
                            <span th:if="${entry.region != null && entry.teamName != null}"> / </span>
                            <span th:if="${entry.teamName != null}" th:text="${entry.teamName}"></span>
                        </td>
                        <td th:text="${entry.grade}"></td>
                        <td class="status-cell">
                            <span th:if="${entry.mapped}" class="badge badge-mapped">매핑완료</span>
                            <span th:unless="${entry.mapped}" class="badge badge-none">미매핑</span>
                        </td>
                        <td class="mapped-athlete-cell">
                            <span th:if="${entry.mapped}" th:text="${entry.athlete?.name + ' (ID:' + entry.athlete?.id + ')'}"></span>
                        </td>
                        <td>
                            <button th:unless="${entry.mapped}" class="btn btn-primary btn-sm map-btn"
                                    th:attr="data-entry-id=${entry.id},data-name=${entry.athleteName}">매핑</button>
                            <button th:unless="${entry.mapped}" class="btn btn-warning btn-sm create-btn"
                                    th:attr="data-entry-id=${entry.id},data-name=${entry.athleteName}">새 선수</button>
                            <button th:if="${entry.mapped}" class="btn btn-danger btn-sm unmap-btn"
                                    th:attr="data-entry-id=${entry.id}">해제</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- ===== 팀 매핑 탭 ===== -->
        <div th:if="${tab == 'team'}">
            <div class="toolbar">
                <input type="text" id="searchTeam" placeholder="팀명 검색..." oninput="filterTable()">
                <select id="filterStatus" onchange="filterTable()">
                    <option value="all">전체</option>
                    <option value="unmapped" selected>미매핑</option>
                    <option value="mapped">매핑완료</option>
                </select>
                <span class="spacer"></span>
                <span class="stats" id="statsText"></span>
                <button class="btn btn-success" onclick="doAutoMatchTeam()">자동 매칭</button>
                <button class="btn btn-warning" onclick="doBulkCreateTeam()">선택 새팀 (<span id="selectedCount">0</span>)</button>
                <a th:href="@{/admin/competitions/{id}/events(id=${competition.id})}" class="btn btn-secondary">돌아가기</a>
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width:30px"><input type="checkbox" id="checkAll" onclick="toggleCheckAll(this)"></th>
                        <th>선수명</th>
                        <th>지역</th>
                        <th>팀명</th>
                        <th>상태</th>
                        <th>매핑 팀</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody id="entryBody">
                    <tr th:each="entry : ${entries}"
                        th:id="'row-' + ${entry.id}"
                        th:data-name="${entry.teamName}"
                        th:data-mapped="${entry.team != null}"
                        th:data-entry-id="${entry.id}">
                        <td><input th:if="${entry.team == null}" type="checkbox" class="entry-check" th:value="${entry.id}" onchange="updateSelectedCount()"></td>
                        <td th:text="${entry.athleteName}"></td>
                        <td th:text="${entry.region}"></td>
                        <td th:text="${entry.teamName}"></td>
                        <td class="status-cell">
                            <span th:if="${entry.team != null}" class="badge badge-mapped">매핑완료</span>
                            <span th:if="${entry.team == null}" class="badge badge-none">미매핑</span>
                        </td>
                        <td class="mapped-team-cell">
                            <span th:if="${entry.team != null}" th:text="${entry.team.name + ' (' + entry.team.region + ', ID:' + entry.team.id + ')'}"></span>
                        </td>
                        <td>
                            <button th:if="${entry.team == null}" class="btn btn-primary btn-sm team-map-btn"
                                    th:attr="data-entry-id=${entry.id},data-name=${entry.teamName}">매핑</button>
                            <button th:if="${entry.team == null}" class="btn btn-warning btn-sm team-create-btn"
                                    th:attr="data-entry-id=${entry.id},data-name=${entry.teamName}">새 팀</button>
                            <button th:if="${entry.team != null}" class="btn btn-danger btn-sm team-unmap-btn"
                                    th:attr="data-entry-id=${entry.id}">해제</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Athlete Mapping Modal -->
    <div class="modal-overlay" id="mappingModal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 id="modalTitle">선수 매핑</h2>
            <div id="candidatesLoading">후보를 검색 중...</div>
            <ul class="candidate-list hidden" id="candidateList"></ul>
            <div class="no-candidates hidden" id="noCandidates">일치하는 후보가 없습니다.</div>
            <div class="modal-actions" id="modalActions" style="display:none;">
                <button class="btn btn-primary" id="confirmMapBtn" onclick="confirmMap()">매핑 확인</button>
                <button class="btn btn-secondary" onclick="closeModal()">취소</button>
            </div>
        </div>
    </div>

    <!-- New Athlete Modal -->
    <div class="modal-overlay" id="newAthleteModal">
        <div class="modal">
            <button class="modal-close" onclick="closeNewAthleteModal()">&times;</button>
            <h2 id="newAthleteTitle">새 선수 등록</h2>
            <div class="new-athlete-form">
                <p id="newAthleteInfo" style="margin-bottom:0.5rem;"></p>
                <label for="birthYearInput">출생년도 (선택)</label>
                <input type="number" id="birthYearInput" placeholder="예: 2005" min="1950" max="2025">
            </div>
            <div class="modal-actions">
                <button class="btn btn-success" onclick="confirmCreateAndMap()">등록 및 매핑</button>
                <button class="btn btn-secondary" onclick="closeNewAthleteModal()">취소</button>
            </div>
        </div>
    </div>

    <!-- Team Mapping Modal -->
    <div class="modal-overlay" id="teamMappingModal">
        <div class="modal">
            <button class="modal-close" onclick="closeTeamModal()">&times;</button>
            <h2 id="teamModalTitle">팀 매핑</h2>
            <div id="teamCandidatesLoading">후보를 검색 중...</div>
            <ul class="candidate-list hidden" id="teamCandidateList"></ul>
            <div class="no-candidates hidden" id="noTeamCandidates">일치하는 후보가 없습니다.</div>
            <div class="modal-actions" id="teamModalActions" style="display:none;">
                <button class="btn btn-primary" onclick="confirmTeamMap()">매핑 확인</button>
                <button class="btn btn-secondary" onclick="closeTeamModal()">취소</button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const compId = /*[[${competition.id}]]*/ 0;
        const currentTab = /*[[${tab}]]*/ 'athlete';
        let currentEntryId = null;
        let selectedAthleteId = null;
        let selectedTeamId = null;

        // ===== 공통 =====
        function updateStats() {
            const rows = document.querySelectorAll('#entryBody tr');
            let total = 0, mapped = 0, unmapped = 0, visible = 0;
            rows.forEach(row => {
                total++;
                if (row.dataset.mapped === 'true') mapped++; else unmapped++;
                if (row.style.display !== 'none') visible++;
            });
            document.getElementById('statsText').textContent =
                '전체 ' + total + ' | 매핑 ' + mapped + ' | 미매핑 ' + unmapped +
                (visible < total ? ' | 표시 ' + visible : '');
        }

        function filterTable() {
            const searchEl = document.getElementById('searchName') || document.getElementById('searchTeam');
            const search = searchEl ? searchEl.value.toLowerCase() : '';
            const status = document.getElementById('filterStatus').value;
            document.querySelectorAll('#entryBody tr').forEach(row => {
                const name = (row.dataset.name || '').toLowerCase();
                const isMapped = row.dataset.mapped === 'true';
                let show = true;
                if (search && !name.includes(search)) show = false;
                if (status === 'mapped' && !isMapped) show = false;
                if (status === 'unmapped' && isMapped) show = false;
                row.style.display = show ? '' : 'none';
            });
            updateStats();
        }

        function getVisibleChecked() {
            return [...document.querySelectorAll('.entry-check:checked')]
                .filter(cb => cb.closest('tr').style.display !== 'none');
        }
        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = getVisibleChecked().length;
        }
        function toggleCheckAll(master) {
            document.querySelectorAll('#entryBody tr').forEach(row => {
                if (row.style.display === 'none') return;
                const cb = row.querySelector('.entry-check');
                if (cb) cb.checked = master.checked;
            });
            updateSelectedCount();
        }

        // ===== 선수 매핑 =====
        function doAutoMatch() {
            if (!confirm('자동 매칭을 실행하시겠습니까?')) return;
            fetch('/admin/competitions/' + compId + '/mapping/auto', { method: 'POST' })
                .then(r => r.json())
                .then(data => { alert(data.matched + '건이 자동 매칭되었습니다.'); if (data.matched > 0) location.reload(); });
        }

        function openMappingDialog(entryId, name) {
            currentEntryId = entryId; selectedAthleteId = null;
            document.getElementById('modalTitle').textContent = '선수 매핑 - ' + name;
            document.getElementById('candidatesLoading').classList.remove('hidden');
            document.getElementById('candidateList').classList.add('hidden');
            document.getElementById('candidateList').innerHTML = '';
            document.getElementById('noCandidates').classList.add('hidden');
            document.getElementById('modalActions').style.display = 'none';
            document.getElementById('mappingModal').classList.add('active');

            fetch('/admin/competitions/' + compId + '/mapping/candidates?entryId=' + entryId)
                .then(r => r.json()).then(candidates => {
                    document.getElementById('candidatesLoading').classList.add('hidden');
                    if (candidates.length === 0) { document.getElementById('noCandidates').classList.remove('hidden'); return; }
                    const list = document.getElementById('candidateList');
                    list.classList.remove('hidden');
                    document.getElementById('modalActions').style.display = 'flex';
                    candidates.forEach(c => {
                        const li = document.createElement('li');
                        li.className = 'candidate-item'; li.dataset.athleteId = c.athleteId;
                        li.onclick = function() { document.querySelectorAll('#candidateList .candidate-item').forEach(el => el.classList.remove('selected')); li.classList.add('selected'); selectedAthleteId = c.athleteId; };
                        let hist = c.history && c.history.length > 0
                            ? '<div class="candidate-history">이력:<ul>' + c.history.map(h => '<li>' + h.competitionName + (h.teamName ? ' / ' + h.teamName : '') + (h.region ? ' (' + h.region + ')' : '') + '</li>').join('') + '</ul></div>'
                            : '<div class="candidate-history">이력 없음</div>';
                        li.innerHTML = '<div class="candidate-info">' + c.name + ' (' + (c.gender === 'M' ? '남' : '여') + ')' + (c.birthYear ? ' / ' + c.birthYear + '년생' : '') + ' [ID:' + c.athleteId + ']' + '</div>' + hist;
                        list.appendChild(li);
                    });
                    if (candidates.length === 1) list.querySelector('.candidate-item').click();
                });
        }
        function closeModal() { document.getElementById('mappingModal').classList.remove('active'); currentEntryId = null; selectedAthleteId = null; }
        function confirmMap() {
            if (!selectedAthleteId) { alert('선수를 선택해주세요.'); return; }
            fetch('/admin/competitions/' + compId + '/mapping/map', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entryId: currentEntryId, athleteId: selectedAthleteId }) })
                .then(r => r.json()).then(() => { const eid = currentEntryId; closeModal(); updateRowMapped(eid, selectedAthleteId, 'athlete'); });
        }

        function createNewAthlete(entryId, name) {
            currentEntryId = entryId;
            document.getElementById('newAthleteTitle').textContent = '새 선수 등록 - ' + name;
            document.getElementById('newAthleteInfo').textContent = '선수명: ' + name;
            document.getElementById('birthYearInput').value = '';
            document.getElementById('newAthleteModal').classList.add('active');
        }
        function closeNewAthleteModal() { document.getElementById('newAthleteModal').classList.remove('active'); currentEntryId = null; }
        function confirmCreateAndMap() {
            const byVal = document.getElementById('birthYearInput').value;
            fetch('/admin/competitions/' + compId + '/mapping/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entryId: parseInt(currentEntryId), birthYear: byVal ? parseInt(byVal) : null }) })
                .then(r => { if (!r.ok) throw new Error('Server error'); return r.json(); })
                .then(data => { const eid = currentEntryId; closeNewAthleteModal(); updateRowMapped(eid, data.athleteId, 'athlete'); })
                .catch(err => alert('실패: ' + err.message));
        }

        function doBulkCreate() {
            const checked = getVisibleChecked();
            if (checked.length === 0) { alert('선택된 항목이 없습니다.'); return; }
            if (!confirm(checked.length + '명을 새선수로 등록하시겠습니까?')) return;
            fetch('/admin/competitions/' + compId + '/mapping/create-bulk', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entryIds: checked.map(cb => parseInt(cb.value)) }) })
                .then(r => r.json()).then(data => { alert(data.created + '명 등록.'); location.reload(); }).catch(err => alert('오류: ' + err.message));
        }

        function doUnmap(entryId) {
            if (!confirm('매핑을 해제하시겠습니까?')) return;
            fetch('/admin/competitions/' + compId + '/mapping/unmap', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entryId: entryId }) })
                .then(r => r.json()).then(() => updateRowUnmapped(entryId));
        }

        // ===== 팀 매핑 =====
        function doAutoMatchTeam() {
            if (!confirm('팀 자동 매칭을 실행하시겠습니까?')) return;
            fetch('/admin/competitions/' + compId + '/mapping/team-auto', { method: 'POST' })
                .then(r => r.json()).then(data => { alert(data.matched + '건이 자동 매칭되었습니다.'); if (data.matched > 0) location.reload(); });
        }

        function openTeamMappingDialog(entryId, name) {
            currentEntryId = entryId; selectedTeamId = null;
            document.getElementById('teamModalTitle').textContent = '팀 매핑 - ' + (name || '');
            document.getElementById('teamCandidatesLoading').classList.remove('hidden');
            document.getElementById('teamCandidateList').classList.add('hidden');
            document.getElementById('teamCandidateList').innerHTML = '';
            document.getElementById('noTeamCandidates').classList.add('hidden');
            document.getElementById('teamModalActions').style.display = 'none';
            document.getElementById('teamMappingModal').classList.add('active');

            fetch('/admin/competitions/' + compId + '/mapping/team-candidates?entryId=' + entryId)
                .then(r => r.json()).then(candidates => {
                    document.getElementById('teamCandidatesLoading').classList.add('hidden');
                    if (candidates.length === 0) { document.getElementById('noTeamCandidates').classList.remove('hidden'); return; }
                    const list = document.getElementById('teamCandidateList');
                    list.classList.remove('hidden');
                    document.getElementById('teamModalActions').style.display = 'flex';
                    candidates.forEach(c => {
                        const li = document.createElement('li');
                        li.className = 'candidate-item'; li.dataset.teamId = c.teamId;
                        li.onclick = function() { document.querySelectorAll('#teamCandidateList .candidate-item').forEach(el => el.classList.remove('selected')); li.classList.add('selected'); selectedTeamId = c.teamId; };
                        li.innerHTML = '<div class="candidate-info">' + c.name + ' (' + c.region + ') [ID:' + c.teamId + ']</div>';
                        list.appendChild(li);
                    });
                    if (candidates.length === 1) list.querySelector('.candidate-item').click();
                });
        }
        function closeTeamModal() { document.getElementById('teamMappingModal').classList.remove('active'); currentEntryId = null; selectedTeamId = null; }
        function confirmTeamMap() {
            if (!selectedTeamId) { alert('팀을 선택해주세요.'); return; }
            fetch('/admin/competitions/' + compId + '/mapping/team-map', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entryId: currentEntryId, teamId: selectedTeamId }) })
                .then(r => r.json()).then(() => { const eid = currentEntryId; closeTeamModal(); updateRowMapped(eid, selectedTeamId, 'team'); });
        }

        function createNewTeam(entryId) {
            fetch('/admin/competitions/' + compId + '/mapping/team-create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entryId: parseInt(entryId) }) })
                .then(r => { if (!r.ok) throw new Error('Server error'); return r.json(); })
                .then(data => updateRowMapped(entryId, data.teamId, 'team'))
                .catch(err => alert('실패: ' + err.message));
        }

        function doBulkCreateTeam() {
            const checked = getVisibleChecked();
            if (checked.length === 0) { alert('선택된 항목이 없습니다.'); return; }
            if (!confirm(checked.length + '개 팀을 등록하시겠습니까?')) return;
            fetch('/admin/competitions/' + compId + '/mapping/team-create-bulk', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entryIds: checked.map(cb => parseInt(cb.value)) }) })
                .then(r => r.json()).then(data => { alert(data.created + '개 팀 등록.'); location.reload(); }).catch(err => alert('오류: ' + err.message));
        }

        function doUnmapTeam(entryId) {
            if (!confirm('팀 매핑을 해제하시겠습니까?')) return;
            fetch('/admin/competitions/' + compId + '/mapping/team-unmap', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entryId: entryId }) })
                .then(r => r.json()).then(() => updateRowUnmapped(entryId));
        }

        // ===== 공통 행 업데이트 =====
        function updateRowMapped(entryId, mappedId, type) {
            const row = document.getElementById('row-' + entryId);
            if (!row) return;
            row.dataset.mapped = 'true';
            row.querySelector('.status-cell').innerHTML = '<span class="badge badge-mapped">매핑완료</span>';
            const mappedCell = row.querySelector('.mapped-athlete-cell') || row.querySelector('.mapped-team-cell');
            if (mappedCell) mappedCell.textContent = (type === 'athlete' ? row.dataset.name : row.dataset.name) + ' (ID:' + mappedId + ')';
            const cbTd = row.querySelector('td:first-child');
            if (cbTd) cbTd.innerHTML = '';
            const actionClass = type === 'team' ? 'team-unmap-btn' : 'unmap-btn';
            row.querySelector('td:last-child').innerHTML = '<button class="btn btn-danger btn-sm ' + actionClass + '" data-entry-id="' + entryId + '">해제</button>';
            filterTable();
        }

        function updateRowUnmapped(entryId) {
            const row = document.getElementById('row-' + entryId);
            if (!row) return;
            row.dataset.mapped = 'false';
            const firstTd = row.querySelector('td:first-child');
            firstTd.innerHTML = '<input type="checkbox" class="entry-check" value="' + entryId + '" onchange="updateSelectedCount()">';
            row.querySelector('.status-cell').innerHTML = '<span class="badge badge-none">미매핑</span>';
            const mappedCell = row.querySelector('.mapped-athlete-cell') || row.querySelector('.mapped-team-cell');
            if (mappedCell) mappedCell.textContent = '';
            const name = row.dataset.name || '';
            if (currentTab === 'team') {
                row.querySelector('td:last-child').innerHTML =
                    '<button class="btn btn-primary btn-sm team-map-btn" data-entry-id="' + entryId + '" data-name="' + name + '">매핑</button> ' +
                    '<button class="btn btn-warning btn-sm team-create-btn" data-entry-id="' + entryId + '">새 팀</button>';
            } else {
                row.querySelector('td:last-child').innerHTML =
                    '<button class="btn btn-primary btn-sm map-btn" data-entry-id="' + entryId + '" data-name="' + name + '">매핑</button> ' +
                    '<button class="btn btn-warning btn-sm create-btn" data-entry-id="' + entryId + '" data-name="' + name + '">새 선수</button>';
            }
            filterTable();
        }

        // Event delegation
        document.querySelector('table').addEventListener('click', function(e) {
            const btn = e.target.closest('button');
            if (!btn) return;
            const entryId = btn.dataset.entryId;
            const name = btn.dataset.name;
            if (btn.classList.contains('map-btn')) openMappingDialog(entryId, name);
            else if (btn.classList.contains('create-btn')) createNewAthlete(entryId, name);
            else if (btn.classList.contains('unmap-btn')) doUnmap(entryId);
            else if (btn.classList.contains('team-map-btn')) openTeamMappingDialog(entryId, name);
            else if (btn.classList.contains('team-create-btn')) createNewTeam(entryId);
            else if (btn.classList.contains('team-unmap-btn')) doUnmapTeam(entryId);
        });

        filterTable();
    </script>
</body>
</html>
