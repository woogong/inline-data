<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${athlete.name} + ' (관리) - InlineData'">선수 상세 - InlineData</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
        nav { background: #2c3e50; color: #fff; padding: 0.8rem 0; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #fff; text-decoration: underline; }
        nav .nav-brand { font-weight: bold; font-size: 1.1rem; }
        main { padding: 1.5rem 0; }
        dl { margin: 1rem 0; }
        dt { font-weight: 600; color: #555; margin-top: 0.8rem; }
        dd { margin-left: 0; padding: 0.3rem 0; }
        .btn { display: inline-block; padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .actions { margin-top: 1.5rem; }
        .actions > * { margin-right: 0.5rem; }
        .delete-form { display: inline; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
        <h1 th:text="${athlete.name}">선수명</h1>
        <div th:if="${errorMessage}" style="padding:0.6rem 1rem; background:#fdecea; border:1px solid #e74c3c; border-radius:4px; color:#c0392b; margin-bottom:1rem; display:flex; align-items:center; gap:1rem;">
            <span th:text="${errorMessage}"></span>
            <form th:action="@{/admin/athletes/{id}/delete-force(id=${athlete.id})}" method="post" style="display:inline;"
                  onsubmit="return confirm('참가 이력을 포함하여 선수를 완전히 삭제합니다. 계속하시겠습니까?');">
                <button type="submit" class="btn btn-danger" style="white-space:nowrap;">참가 이력 포함 삭제</button>
            </form>
        </div>
        <dl>
            <dt>성별</dt>
            <dd th:text="${athlete.gender == 'M' ? '남' : (athlete.gender == 'F' ? '여' : '혼성')}"></dd>
            <th:block th:if="${athlete.birthYear != null}">
                <dt>생년</dt>
                <dd th:text="${athlete.birthYear}"></dd>
            </th:block>
            <th:block th:if="${athlete.notes != null and !athlete.notes.isEmpty()}">
                <dt>비고</dt>
                <dd th:text="${athlete.notes}"></dd>
            </th:block>
            <dt>등록일시</dt>
            <dd th:text="${#temporals.format(athlete.createdAt, 'yyyy-MM-dd HH:mm')}"></dd>
            <dt>수정일시</dt>
            <dd th:text="${#temporals.format(athlete.updatedAt, 'yyyy-MM-dd HH:mm')}"></dd>
        </dl>
        <div class="actions">
            <a th:href="@{/admin/athletes/{id}/edit(id=${athlete.id})}" class="btn btn-primary">수정</a>
            <form th:action="@{/admin/athletes/{id}/delete(id=${athlete.id})}" method="post" class="delete-form"
                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                <button type="submit" class="btn btn-danger">삭제</button>
            </form>
            <a th:href="@{/admin/athletes}" class="btn btn-secondary">목록으로</a>
        </div>
    </main>
</body>
</html>
