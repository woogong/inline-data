<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${event.divisionName} + ' ' + ${event.eventName} + ' ' + ${round.round} + ' - 인라인데이터'">경기 상세 - 인라인데이터</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
        nav { background: #2c3e50; color: #fff; padding: 0.8rem 0; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #fff; text-decoration: underline; }
        nav .nav-brand { font-weight: bold; font-size: 1.1rem; }
        main { padding: 1.5rem 0; }
        .event-info { display: flex; gap: 2rem; margin: 0.5rem 0 1rem; color: #555; font-size: 0.95rem; }
        .event-info span { font-weight: 600; }
        h2 { margin-top: 1.5rem; margin-bottom: 0.3rem; color: #2c3e50; font-size: 1.1rem; }
        table { width: 100%; border-collapse: collapse; margin: 0.3rem 0 1rem; }
        th, td { padding: 0.4rem 0.8rem; border: 1px solid #ddd; text-align: left; }
        th { background: #f5f5f5; font-weight: 600; }
        tr:hover { background: #fafafa; }
        .rank-1 { background: #fff9e6; }
        .rank-2 { background: #f0f0f0; }
        .rank-3 { background: #fef0e7; }
        .qualified { background: #e8f5e9; }
        .not-qualified { background: #fafafa; }
        .q-mark { color: #27ae60; font-weight: 700; }
        .new-record { font-weight: 600; font-size: 0.85rem; }
        .new-record.nr-competition { color: #e74c3c; }
        .new-record.nr-division { color: #e67e22; }
        .new-record.nr-korea { color: #2980b9; }
        .new-record.nr-world { color: #8e44ad; }
        .note { color: #999; font-size: 0.85rem; }
        .btn { display: inline-block; padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .btn-youtube { background: #ff0000; color: #fff; font-size: 0.8rem; padding: 0.2rem 0.7rem; vertical-align: middle; }
        .btn-youtube:hover { background: #cc0000; }
        .actions { margin-top: 1.5rem; }
        .empty { color: #999; font-style: italic; margin: 1rem 0; }
        .heat-header { display: flex; align-items: center; gap: 0.6rem; margin-top: 1.5rem; margin-bottom: 0.3rem; }
        .heat-header h2 { margin: 0; }
        .video-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000; align-items:center; justify-content:center; }
        .video-modal-overlay.active { display:flex; }
        .video-modal { background:#000; border-radius:8px; overflow:hidden; width:min(900px,95vw); position:relative; }
        .video-modal-close { position:absolute; top:8px; right:12px; color:#fff; font-size:1.5rem; cursor:pointer; z-index:10; line-height:1; background:rgba(0,0,0,0.5); border:none; border-radius:50%; width:32px; height:32px; }
        .video-modal iframe { display:block; width:100%; aspect-ratio:16/9; border:none; }
    </style>
    <style th:replace="~{fragments/athlete-modal :: styles}"></style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
        <h1 th:text="${event.divisionName} + ' ' + ${event.eventName} + ' ' + ${round.round}">경기</h1>
        <div class="event-info">
            <th:block th:if="${round.eventNumber != null}"><div>경기번호: <span th:text="'#' + ${round.eventNumber}"></span></div></th:block>
            <th:block th:if="${round.dayNumber != null}"><div>일차: <span th:text="${round.dayNumber} + '일차'"></span></div></th:block>
        </div>

        <!-- 결과가 있는 경우 -->
        <div th:if="${hasResults}">
            <div th:each="heatEntry : ${heatsWithResults}">
                <div class="heat-header">
                    <h2 th:text="${heatEntry.key.heatNumber == 0 ? '결승' : heatEntry.key.heatNumber + '조'}">조</h2>
                    <button th:if="${heatEntry.key.youtubeUrl != null}" class="btn btn-youtube"
                            th:attr="onclick='openVideoModal(\'' + ${heatEntry.key.youtubeUrl} + '\')'"
                            type="button">▶ 경기 영상</button>
                </div>
                <table>
                    <thead><tr><th style="width:50px">순위</th><th style="width:60px">배번</th><th>선수명</th><th>소속</th><th>기록</th><th style="width:60px">진출</th><th>비고</th></tr></thead>
                    <tbody>
                        <tr th:each="er : ${heatEntry.value}"
                            th:classappend="${isFinal
                                ? (er.ranking == 1 ? 'rank-1' : (er.ranking == 2 ? 'rank-2' : (er.ranking == 3 ? 'rank-3' : '')))
                                : (er.qualification != null ? 'qualified' : 'not-qualified')}">
                            <td th:text="${er.ranking}"></td>
                            <td th:text="${er.heatEntry.bibNumber}"></td>
                            <td><span class="athlete-link" th:text="${er.heatEntry.entry.athleteName}" th:attr="data-name=${er.heatEntry.entry.athleteName}"></span></td>
                            <td>
                                <span th:if="${er.heatEntry.entry.region != null}" th:text="${er.heatEntry.entry.region}"></span>
                                <span th:if="${er.heatEntry.entry.region != null && er.heatEntry.entry.teamName != null}"> </span>
                                <span th:if="${er.heatEntry.entry.teamName != null}" th:text="${er.heatEntry.entry.teamName}"></span>
                                <span th:if="${er.heatEntry.entry.grade != null}" th:text="${er.heatEntry.entry.grade}" style="color:#888; font-size:0.85rem;"></span>
                            </td>
                            <td><span th:text="${er.record}"></span>
                                <span th:if="${er.newRecord != null}" class="new-record"
                                      th:classappend="${er.newRecord == '대회신' ? 'nr-competition' : (er.newRecord == '부별신' ? 'nr-division' : (er.newRecord == '한국신' ? 'nr-korea' : (er.newRecord == '세계신' ? 'nr-world' : '')))}"
                                      th:text="' ' + ${er.newRecord}"></span></td>
                            <td><span th:if="${er.qualification != null}" class="q-mark" th:text="${er.qualification}"></span></td>
                            <td><span th:if="${er.note != null}" class="note" th:text="${er.note}"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 결과 없음: 출전 목록 -->
        <div th:if="${!hasResults}">
            <div th:if="${heatsWithEntries.isEmpty()}" class="empty">출전 엔트리가 없습니다.</div>
            <div th:each="heatEntry : ${heatsWithEntries}">
                <div class="heat-header">
                    <h2 th:text="${heatEntry.key.heatNumber == 0 ? '결승' : heatEntry.key.heatNumber + '조'}">조</h2>
                    <button th:if="${heatEntry.key.youtubeUrl != null}" class="btn btn-youtube"
                            th:attr="onclick='openVideoModal(\'' + ${heatEntry.key.youtubeUrl} + '\')'"
                            type="button">▶ 경기 영상</button>
                </div>
                <table>
                    <thead><tr><th style="width:60px">배번</th><th>선수명</th><th>소속</th><th>학년</th></tr></thead>
                    <tbody>
                        <tr th:each="he : ${heatEntry.value}">
                            <td th:text="${he.bibNumber}"></td>
                            <td><span class="athlete-link" th:text="${he.entry.athleteName}" th:attr="data-name=${he.entry.athleteName}"></span></td>
                            <td>
                                <span th:if="${he.entry.region != null}" th:text="${he.entry.region}"></span>
                                <span th:if="${he.entry.region != null && he.entry.teamName != null}"> </span>
                                <span th:if="${he.entry.teamName != null}" th:text="${he.entry.teamName}"></span>
                            </td>
                            <td th:text="${he.entry.grade}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="actions">
            <a th:href="@{/competitions/{compId}/events/{eventId}(compId=${competition.id}, eventId=${event.id})}" class="btn btn-secondary">종목으로 돌아가기</a>
        </div>
    </main>

    <div th:replace="~{fragments/athlete-modal :: modal(${competition.id})}"></div>

    <!-- 동영상 모달 -->
    <div class="video-modal-overlay" id="videoModalOverlay" onclick="closeVideoModal(event)">
        <div class="video-modal">
            <button class="video-modal-close" onclick="closeVideoModalDirect()" title="닫기">✕</button>
            <iframe id="videoModalIframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <script>
        function parseYoutubeStartSeconds(url) {
            const tMatch = url.match(/[?&]t=([^&]+)/);
            if (!tMatch) return null;
            const t = tMatch[1];
            const hmsMatch = t.match(/^(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s?)?$/);
            if (hmsMatch) {
                const h = parseInt(hmsMatch[1] || 0);
                const m = parseInt(hmsMatch[2] || 0);
                const s = parseInt(hmsMatch[3] || 0);
                const total = h * 3600 + m * 60 + s;
                return total > 0 ? total : null;
            }
            return null;
        }

        function getYoutubeEmbedUrl(url) {
            if (!url) return null;
            url = url.trim();
            let videoId = null;
            const watchMatch = url.match(/[?&]v=([^&]+)/);
            if (watchMatch) { videoId = watchMatch[1]; }
            else {
                const shortMatch = url.match(/youtu\.be\/([^?&]+)/);
                if (shortMatch) { videoId = shortMatch[1]; }
                else {
                    const embedMatch = url.match(/embed\/([^?&]+)/);
                    if (embedMatch) { videoId = embedMatch[1]; }
                }
            }
            if (!videoId) return url;
            const start = parseYoutubeStartSeconds(url);
            return 'https://www.youtube.com/embed/' + videoId + '?autoplay=1' + (start ? '&start=' + start : '');
        }

        function openVideoModal(url) {
            const embedUrl = getYoutubeEmbedUrl(url);
            document.getElementById('videoModalIframe').src = embedUrl || url;
            document.getElementById('videoModalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeVideoModal(e) {
            if (e.target === document.getElementById('videoModalOverlay')) closeVideoModalDirect();
        }

        function closeVideoModalDirect() {
            document.getElementById('videoModalOverlay').classList.remove('active');
            document.getElementById('videoModalIframe').src = '';
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVideoModalDirect(); });
    </script>
</body>
</html>
