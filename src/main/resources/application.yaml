server:
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1
    connection-timeout: -1
    keep-alive-timeout: -1

spring:
  application:
    name: inlinedata
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
  jpa:
    hibernate:
      ddl-auto: validate         # 스키마 변경은 Flyway 전담, Hibernate는 entity-DB 정합성만 검증
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true    # 기존 운영 DB는 스키마가 이미 있으므로 V1을 baseline으로 간주
    baseline-version: 1

app:
  result-import:
    watch-dir: ""
    archive-dir: ""
    error-dir: ""
    polling-interval-ms: 10000
    stable-wait-seconds: 15
