server:
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1
    connection-timeout: -1
    keep-alive-timeout: -1

spring:
  application:
    name: inlinedata
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  result-import:
    watch-dir: "/Users/batang/Library/CloudStorage/OneDrive-개인/posting"
    archive-dir: ""
    error-dir: ""
    polling-interval-ms: 10000
    stable-wait-seconds: 15
    staging-dir: ""                 # 기본 ${java.io.tmpdir}/inline-staging
    copy-timeout-seconds: 60        # 파일당 복사 타임아웃
    parallel-downloads: 4           # Stage 1 병렬 스레드 수
