services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: ${DB_USERNAME:-inlinedata}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - upload-data:/data/inlinedata
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: inlinedata
      MARIADB_USER: ${DB_USERNAME:-inlinedata}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  upload-data: